services:
  - type: web
    name: gallo-ingest
    runtime: docker
    plan: standard # 2GB RAM — metadata xlsx is loaded into memory at boot
    region: frankfurt # closest to eu-north-1 S3 and EU FileMaker hosts
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOAD_TMP_DIR
        value: /tmp/gallo-uploads
      - key: INGEST_ADMIN_SECRET
        sync: false
      - key: GALLO_FM_HOST
        sync: false
      - key: GALLO_FM_DB
        sync: false
      - key: GALLO_FM_USER
        sync: false
      - key: GALLO_FM_PASS
        sync: false
      - key: GALLO_FM_LAYOUT
        sync: false
      - key: GALLO_FM_TAPE_LAYOUT
        sync: false
      - key: MADSTREAMER_FM_HOST
        sync: false
      - key: MADSTREAMER_FM_DB
        sync: false
      - key: AWS_REGION
        value: eu-north-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: FM_SERVER_ASSET_PATH
        sync: false
